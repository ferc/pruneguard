name: release

on:
  push:
    branches: [main]
    paths: [npm/pruneguard/package.json]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      version_changed: ${{ steps.ver.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          VERSION=$(node -e "console.log(require('./npm/pruneguard/package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "pruneguard@${VERSION}" version 2>/dev/null | grep -qx "$VERSION"; then
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "pruneguard@${VERSION} already on npm — skipping release."
          else
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "pruneguard@${VERSION} not on npm — will publish."
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            npm-dir: cli-darwin-arm64
            build: cargo

          - runner: macos-latest
            target: x86_64-apple-darwin
            npm-dir: cli-darwin-x64
            build: cargo

          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm-dir: cli-linux-x64-gnu
            build: cargo

          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            npm-dir: cli-linux-arm64-gnu
            build: cross

          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            npm-dir: cli-linux-x64-musl
            build: zigbuild

          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            npm-dir: cli-linux-arm64-musl
            build: zigbuild

          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            npm-dir: cli-win32-x64-msvc
            build: cargo

          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            npm-dir: cli-win32-arm64-msvc
            build: cargo

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.build == 'cross'
        uses: taiki-e/install-action@cross

      - name: Install zig
        if: matrix.build == 'zigbuild'
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.build == 'zigbuild'
        run: pip3 install cargo-zigbuild

      - name: Build (cargo)
        if: matrix.build == 'cargo'
        run: cargo build --release -p pruneguard --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.build == 'cross'
        run: cross build --release -p pruneguard --target ${{ matrix.target }}

      - name: Build (zigbuild)
        if: matrix.build == 'zigbuild'
        run: cargo zigbuild --release -p pruneguard --target ${{ matrix.target }}

      - name: Stage binary (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p npm/${{ matrix.npm-dir }}/bin
          cp target/${{ matrix.target }}/release/pruneguard npm/${{ matrix.npm-dir }}/bin/pruneguard

      - name: Stage binary (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p npm/${{ matrix.npm-dir }}/bin
          cp target/${{ matrix.target }}/release/pruneguard.exe npm/${{ matrix.npm-dir }}/bin/pruneguard.exe
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.npm-dir }}
          path: npm/${{ matrix.npm-dir }}/bin/
          if-no-files-found: error

  build-js:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/pruneguard build-js
      - run: cargo run -p pruneguard --bin generate_schemas

      - uses: actions/upload-artifact@v4
        with:
          name: js-dist
          path: |
            npm/pruneguard/dist/
            npm/pruneguard/configuration_schema.json
            npm/pruneguard/report_schema.json
          if-no-files-found: error

  publish:
    needs: [check-version, build, build-js]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Stage platform binaries
      - name: Stage binaries
        run: |
          for dir in artifacts/binary-cli-*; do
            npm_dir=$(basename "$dir" | sed 's/^binary-//')
            mkdir -p "npm/${npm_dir}/bin"
            cp -r "${dir}/"* "npm/${npm_dir}/bin/"
          done

      # Stage JS dist + schemas
      - name: Stage JS artifacts
        run: |
          cp -r artifacts/js-dist/npm/pruneguard/dist/ npm/pruneguard/dist/
          cp artifacts/js-dist/npm/pruneguard/configuration_schema.json npm/pruneguard/
          cp artifacts/js-dist/npm/pruneguard/report_schema.json npm/pruneguard/

      # Verify all binaries are present
      - name: Verify binaries
        run: |
          for dir in npm/cli-*/; do
            name=$(basename "$dir")
            if [[ "$name" == *win32* ]]; then
              bin="${dir}bin/pruneguard.exe"
            else
              bin="${dir}bin/pruneguard"
            fi
            if [ ! -f "$bin" ]; then
              echo "::error::Missing binary: $bin"
              exit 1
            fi
            echo "✓ $bin"
          done

      # Publish platform packages first
      - name: Publish platform packages
        run: |
          for dir in npm/cli-*/; do
            bash .github/scripts/publish-if-needed.sh "$dir" --provenance --access public --no-git-checks
          done

      # Publish main package
      - name: Publish pruneguard
        run: bash .github/scripts/publish-if-needed.sh npm/pruneguard --provenance --access public --no-git-checks

  smoke:
    needs: [check-version, publish]
    if: needs.check-version.outputs.version_changed == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Smoke test
        run: npx pruneguard@${{ needs.check-version.outputs.version }} --help
