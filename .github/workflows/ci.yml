name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cargo fmt --all --check
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- --deny warnings
      - run: cargo test --workspace
      - run: pnpm --dir apps/pruneguard build-js
      - run: cargo run -p pruneguard --bin generate_schemas
      - run: git diff --exit-code -- npm/pruneguard/configuration_schema.json npm/pruneguard/report_schema.json
      - run: mkdir -p /tmp/pruneguard-pack && npm pack --pack-destination /tmp/pruneguard-pack
        working-directory: npm/pruneguard
