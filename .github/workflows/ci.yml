name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cargo fmt --all --check
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- --deny warnings
      - run: cargo test --workspace
      - run: pnpm --dir apps/pruneguard build-js
      - run: cargo run -p pruneguard --bin generate_schemas
      - run: git diff --exit-code -- npm/pruneguard/configuration_schema.json npm/pruneguard/report_schema.json
      - name: Check version consistency
        run: |
          VERSION=$(node -e "console.log(require('./npm/pruneguard/package.json').version)")
          for pkg in npm/cli-*/package.json; do
            V=$(node -e "console.log(require('./${pkg}').version)")
            if [ "$VERSION" != "$V" ]; then
              echo "::error::Version mismatch: npm/pruneguard=$VERSION but $pkg=$V"
              exit 1
            fi
          done
          node -e "
            const p = require('./npm/pruneguard/package.json');
            for (const [dep, v] of Object.entries(p.optionalDependencies || {})) {
              if (v !== 'workspace:*') { console.error(dep + ' is ' + v + ', expected workspace:*'); process.exit(1); }
            }
          "

      - name: Stage release packages
        run: node scripts/stage_npm_release.mjs

      - name: Verify staged packages have no workspace references
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('.release/npm/pruneguard/package.json', 'utf8'));
            for (const field of ['dependencies','optionalDependencies','peerDependencies','devDependencies']) {
              for (const [dep, ver] of Object.entries(pkg[field] || {})) {
                if (ver.startsWith('workspace:')) {
                  console.error('ERROR: staged package has workspace: reference: ' + dep + '@' + ver);
                  process.exit(1);
                }
              }
            }
            console.log('Staged root package is clean');
          "

      - name: Pack smoke (staged root package)
        run: |
          mkdir -p /tmp/pruneguard-pack
          npm pack --pack-destination /tmp/pruneguard-pack .release/npm/pruneguard
