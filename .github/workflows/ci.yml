name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cargo fmt --all --check
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- --deny warnings
      - run: cargo test --workspace
      - run: pnpm --dir apps/pruneguard build-js
      - run: cargo run -p pruneguard --bin generate_schemas
      - run: git diff --exit-code -- npm/pruneguard/configuration_schema.json npm/pruneguard/report_schema.json
      - name: Check version consistency
        run: |
          VERSION=$(node -e "console.log(require('./npm/pruneguard/package.json').version)")
          for pkg in npm/cli-*/package.json; do
            V=$(node -e "console.log(require('./${pkg}').version)")
            if [ "$VERSION" != "$V" ]; then
              echo "::error::Version mismatch: npm/pruneguard=$VERSION but $pkg=$V"
              exit 1
            fi
          done
          node -e "
            const p = require('./npm/pruneguard/package.json');
            for (const [dep, v] of Object.entries(p.optionalDependencies || {})) {
              if (v !== 'workspace:*') { console.error(dep + ' is ' + v + ', expected workspace:*'); process.exit(1); }
            }
          "

      # Stage release packages (.release/npm/ is the sole publish source).
      # The staging script rewrites workspace:* to concrete versions, injects
      # metadata, and validates: no workspace refs, no banned artifacts, no
      # repo-local paths, all optionalDependencies accounted for.
      - name: Stage release packages
        run: node scripts/stage_npm_release.mjs

      # Independent re-validation of staged output
      - name: Verify staged packages
        run: node scripts/stage_npm_release.mjs --verify

      # Pack smoke: pack the staged root package to verify it produces a
      # valid tarball. The full cross-platform matrix (with real binaries)
      # is validated during the release workflow.
      - name: Pack smoke (staged root package)
        run: |
          PACK_DIR="/tmp/pruneguard-pack"
          rm -rf "$PACK_DIR"
          mkdir -p "$PACK_DIR"
          npm pack --pack-destination "$PACK_DIR" .release/npm/pruneguard

          # Verify the packed tarball contains no workspace: references
          tar -xzf "$PACK_DIR"/*.tgz -C "$PACK_DIR" package/package.json
          if grep -q '"workspace:' "$PACK_DIR/package/package.json"; then
            echo "::error::workspace: reference found in packed tarball"
            exit 1
          fi
          echo "Staged root package packs cleanly with no workspace: leaks"
