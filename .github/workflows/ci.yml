name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cargo fmt --all --check
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- --deny warnings
      - run: cargo test --workspace
      - run: pnpm --dir apps/oxgraph build-js
      - run: cargo check -p oxgraph --features napi
      - run: cargo run -p oxgraph --bin generate_schemas
      - run: git diff --exit-code -- npm/oxgraph/configuration_schema.json npm/oxgraph/report_schema.json
      - run: mkdir -p /tmp/oxgraph-pack && npm pack --pack-destination /tmp/oxgraph-pack
        working-directory: npm/oxgraph
