name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cargo fmt --all --check
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- --deny warnings
      - run: cargo test --workspace
      - run: pnpm --dir apps/pruneguard build-js
      - run: cargo run -p pruneguard --bin generate_schemas
      - run: git diff --exit-code -- npm/pruneguard/configuration_schema.json npm/pruneguard/report_schema.json
      - name: Check version consistency
        run: |
          VERSION=$(node -e "console.log(require('./npm/pruneguard/package.json').version)")
          for pkg in npm/cli-*/package.json; do
            V=$(node -e "console.log(require('./${pkg}').version)")
            if [ "$VERSION" != "$V" ]; then
              echo "::error::Version mismatch: npm/pruneguard=$VERSION but $pkg=$V"
              exit 1
            fi
          done
          node -e "
            const p = require('./npm/pruneguard/package.json');
            for (const [dep, v] of Object.entries(p.optionalDependencies || {})) {
              if (v !== 'workspace:*') { console.error(dep + ' is ' + v + ', expected workspace:*'); process.exit(1); }
            }
          "

      - name: Stage release packages
        # The staging script validates output automatically (workspace refs,
        # required fields, banned artifacts, optionalDependencies parity).
        run: node scripts/stage_npm_release.mjs

      - name: Verify staged packages (independent re-validation)
        run: node scripts/stage_npm_release.mjs --verify

      - name: Verify staged platform packages have required fields
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const releaseDir = '.release/npm';
            const required = ['name','version','description','license','repository','os','cpu'];
            const dirs = fs.readdirSync(releaseDir).filter(d => d.startsWith('cli-'));
            let ok = true;
            for (const dir of dirs) {
              const pkg = JSON.parse(fs.readFileSync(path.join(releaseDir, dir, 'package.json'), 'utf8'));
              for (const field of required) {
                if (pkg[field] === undefined || pkg[field] === null) {
                  console.error('ERROR: ' + dir + ' missing field: ' + field);
                  ok = false;
                }
              }
            }
            if (!ok) process.exit(1);
            console.log('All ' + dirs.length + ' platform packages have required fields');
          "

      - name: Verify staged root package bin entry
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const pkg = JSON.parse(fs.readFileSync('.release/npm/pruneguard/package.json', 'utf8'));
            for (const [cmd, binPath] of Object.entries(pkg.bin || {})) {
              const resolved = path.join('.release/npm/pruneguard', binPath);
              if (!fs.existsSync(resolved)) {
                console.error('ERROR: bin entry \"' + cmd + '\" points to non-existent file: ' + binPath);
                process.exit(1);
              }
            }
            console.log('Root package bin entries point to existing files');
          "

      # Pack smoke validates the staged root package on the current CI
      # platform only. The full cross-platform matrix is validated during
      # the release workflow where each target builds its own binary.
      - name: Pack smoke (staged root package)
        run: |
          mkdir -p /tmp/pruneguard-pack
          npm pack --pack-destination /tmp/pruneguard-pack .release/npm/pruneguard
