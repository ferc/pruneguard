# Benchmark profiles
[profiles]
cold_scan = { iterations = 3, warmup = 1, capture_rss = true }
warm_daemon = { iterations = 10, warmup = 3, capture_rss = false }
comparison = { iterations = 3, warmup = 1, capture_rss = true, deterministic_output = true }

# Tool configurations for comparison benchmarks
[tools.knip]
command = "npx knip"
args = ["--no-progress", "--reporter", "json"]
install = "npm install -g knip"

[tools.dependency-cruiser]
command = "npx depcruise"
args = ["--output-type", "json", "src"]
install = "npm install -g dependency-cruiser"
